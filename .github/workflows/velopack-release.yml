name: Velopack リリース作成

on:
  push:

# ⚠️ 一時的: 踏み台 publish (/transfer-cf Step 11.5) の間だけ contents:write。
# 踏み台 publish 完了後に contents:read へ戻して R2 単独配信にする。
permissions:
  contents: write

# 複数 release/** push が overlap したときの cleanup レース防止のため直列化
concurrency:
  group: release-r2
  cancel-in-progress: false

jobs:
  build-release:
    name: Velopack リリース作成 (R2 配信)
    runs-on: windows-latest
    if: ${{ startsWith(github.ref, 'refs/heads/release/') }}
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: .NET SDK をセットアップ
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 依存関係を復元
        run: dotnet restore TurnOffTheDisplay.slnx

      - name: リリースバージョンを設定
        shell: pwsh
        run: |
          # csproj からバージョンを読み取る
          $csprojPath = "TurnOffTheDisplay.csproj"
          $version = $null

          # 正規表現でバージョンを抽出
          $content = Get-Content -Path $csprojPath -Raw
          if ($content -match '<Version>([^<]+)</Version>') {
            $version = $matches[1]
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            Write-Error "Version not found in csproj at: $csprojPath"
            Write-Host "csproj content:"
            Get-Content -Path $csprojPath | Select-Object -First 30
            exit 1
          }

          Write-Host "Version found: $version"
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "RELEASE_VERSION=$version" -Encoding utf8

      - name: ターゲットフレームワークを取得
        shell: pwsh
        run: |
          # csproj からターゲットフレームワークを読み取る
          $csprojPath = "TurnOffTheDisplay.csproj"
          $targetFramework = $null

          # 正規表現でターゲットフレームワークを抽出
          $content = Get-Content -Path $csprojPath -Raw
          if ($content -match '<TargetFramework>([^<]+)</TargetFramework>') {
            $targetFramework = $matches[1]
          }

          if ([string]::IsNullOrWhiteSpace($targetFramework)) {
            Write-Error "TargetFramework not found in csproj"
            exit 1
          }

          Write-Host "TargetFramework found: $targetFramework"
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "TARGET_FRAMEWORK=$targetFramework" -Encoding utf8

      - name: アプリを公開ビルド
        shell: pwsh
        run: |
          $publishDir = Join-Path "bin" "Release" "$env:TARGET_FRAMEWORK" "win-x64" "publish"
          if (Test-Path $publishDir) {
            Remove-Item -Path $publishDir -Recurse -Force
          }

          Write-Host "Building and publishing application..."
          Write-Host "Target Framework: $env:TARGET_FRAMEWORK"
          Write-Host "Publish Dir: $publishDir"
          dotnet publish "TurnOffTheDisplay.csproj" `
            -c Release `
            -r win-x64 `
            -o $publishDir

          if ($LASTEXITCODE -ne 0) {
            Write-Error "dotnet publish failed with exit code $LASTEXITCODE"
            exit 1
          }

          Write-Host "Publish directory contents:"
          Get-ChildItem -Path $publishDir -Recurse -ErrorAction SilentlyContinue | Select-Object -First 20 | ForEach-Object { Write-Host $_.FullName }

          $exePath = Join-Path $publishDir "TurnOffTheDisplay.exe"
          if (-not (Test-Path $exePath)) {
            Write-Error "TurnOffTheDisplay.exe not found at: $exePath"
            exit 1
          }
          Write-Host "Successfully built: $exePath"

      - name: README.md をテキストファイルに変換
        shell: pwsh
        run: |
          $publishDir = Join-Path "bin" "Release" "$env:TARGET_FRAMEWORK" "win-x64" "publish"
          $readmePath = "README.md"
          $outputPath = Join-Path $publishDir "README.txt"

          $content = Get-Content -Path $readmePath -Raw -Encoding UTF8

          # Markdown 記法を除去してプレーンテキストに変換
          # 画像タグを除去
          $content = $content -replace '<img[^>]*/?>', ''
          # HTMLタグを除去
          $content = $content -replace '<[^>]+>', ''
          # 見出しの # を除去
          $content = $content -replace '(?m)^#{1,6}\s+', ''
          # 絵文字プレフィックスを除去
          $content = $content -replace '[^\x00-\x7F\u3000-\u9FFF\uFF00-\uFFEF\u0080-\u024F]{1,2}\s', ''
          # 太字 **text** → text
          $content = $content -replace '\*\*([^*]+)\*\*', '$1'
          # リンク [text](url) → text (url)
          $content = $content -replace '\[([^\]]+)\]\(([^)]+)\)', '$1 ($2)'
          # 連続する空行を2行に制限
          $content = $content -replace '(\r?\n){3,}', "`n`n"
          $content = $content.Trim()

          # BOM 付き UTF-8 で出力（日本語 Windows 互換）
          $utf8Bom = New-Object System.Text.UTF8Encoding $true
          [System.IO.File]::WriteAllText($outputPath, $content, $utf8Bom)

          Write-Host "README.txt を生成しました: $outputPath"

      - name: Velopack CLI をインストール
        shell: pwsh
        run: |
          dotnet tool install --global vpk
          $toolsPath = "$env:USERPROFILE\.dotnet\tools"
          Add-Content -LiteralPath $env:GITHUB_PATH -Value $toolsPath -Encoding utf8
          Write-Host "Velopack CLI installed to: $toolsPath"
          Write-Host "PATH environment updated"

      - name: Velopack パッケージを作成
        shell: pwsh
        run: |
          $publishDir = Join-Path "bin" "Release" "$env:TARGET_FRAMEWORK" "win-x64" "publish"
          $outputDir = "artifacts"
          $iconPath = Join-Path "icon" "app.ico"

          if (-not (Test-Path $publishDir)) {
            Write-Error "Publish directory not found: $publishDir"
            exit 1
          }

          if (Test-Path $outputDir) {
            Remove-Item -Path $outputDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

          Write-Host "Creating Velopack package..."
          Write-Host "  Pack ID: TurnOffTheDisplay"
          Write-Host "  Version: $env:RELEASE_VERSION"
          Write-Host "  Title: ディスプレイ＠OFF"
          Write-Host "  Channel: win"
          Write-Host "  Main EXE: TurnOffTheDisplay.exe"
          Write-Host "  Publish Dir: $publishDir"
          Write-Host "  Output Dir: $outputDir"
          Write-Host "  Icon: $iconPath"

          vpk pack `
            --packId TurnOffTheDisplay `
            --packVersion $env:RELEASE_VERSION `
            --packTitle "ディスプレイ＠OFF" `
            --packAuthors "ゆろち" `
            --mainExe TurnOffTheDisplay.exe `
            --icon $iconPath `
            --packDir $publishDir `
            --outputDir $outputDir `
            --channel win `
            --shortcuts "Desktop,StartMenu"

          if ($LASTEXITCODE -ne 0) {
            Write-Error "vpk pack failed with exit code $LASTEXITCODE"
            exit 1
          }

          Write-Host "Velopack パッケージ作成完了"
          Write-Host "Artifacts directory contents:"
          if (Test-Path $outputDir) {
            Get-ChildItem -Path $outputDir -Recurse | ForEach-Object { Write-Host "  $($_.FullName)" }
          } else {
            Write-Error "Artifacts directory was not created"
            exit 1
          }

      - name: Node.js をセットアップ (wrangler 4.x は Node 22 必須)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: wrangler CLI をインストール
        shell: pwsh
        run: |
          # サプライチェーン攻撃防止のため明示的にバージョン固定
          npm install -g wrangler@4.95.0
          if ($LASTEXITCODE -ne 0) {
            Write-Error "wrangler install failed with exit code $LASTEXITCODE"
            exit 1
          }
          wrangler --version

      # 同名 releases.win.json は冪等に上書き、リリース完了後に旧バージョン nupkg は
      # cleanup step で manifest 外を掃除する
      - name: R2 バケット totd-updates にアップロード
        shell: pwsh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          $ErrorActionPreference = "Stop"
          $outputDir = "artifacts"
          if (-not (Test-Path $outputDir)) {
            Write-Error "Artifacts directory not found: $outputDir"
            exit 1
          }

          $files = Get-ChildItem -Path $outputDir -File
          $uploaded = 0
          foreach ($f in $files) {
            Write-Host "::group::Upload $($f.Name)"
            wrangler r2 object put "totd-updates/$($f.Name)" --file="$($f.FullName)" --remote
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::endgroup::"
              Write-Error "wrangler put failed for $($f.Name)"
              exit 1
            }
            Write-Host "::endgroup::"
            $uploaded++
          }
          Write-Host "R2 アップロード完了: $uploaded ファイル"

      - name: 配信確認 (releases.win.json の HTTP 200 を検証)
        shell: pwsh
        run: |
          $url = "https://totd.nephilim.jp/releases.win.json"
          $maxAttempts = 5
          for ($i = 1; $i -le $maxAttempts; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri $url -Method Get -TimeoutSec 30 -UseBasicParsing
              Write-Host "HTTP $($resp.StatusCode) ($($resp.RawContentLength) bytes) - $url"
              exit 0
            } catch {
              Write-Host "Attempt $i/$maxAttempts failed: $($_.Exception.Message)"
              if ($i -eq $maxAttempts) {
                Write-Error "releases.win.json reach failed: $url"
                exit 1
              }
              Start-Sleep -Seconds 5
            }
          }

      # 旧バージョン nupkg のクリーンアップ (Aggressive 戦略):
      # - releases.win.json (manifest) に含まれない *.nupkg を削除
      # - Setup.exe / Portable.zip / RELEASES / assets.*.json / releases.*.json は
      #   固定ファイル名で毎リリース上書きされる Velopack 内部 & ランディング DL 用なので保護
      # - 削除対象を「.nupkg かつ manifest 外」に絞り、想定外のファイルを誤って消さない
      # - keep set は public endpoint からではなくローカル artifacts/ の manifest から構築
      #   (CDN/R2 の伝播タイミング次第で旧 manifest を読む race condition を回避)
      - name: 旧バージョン nupkg を削除 (manifest 外をクリーンアップ)
        shell: pwsh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          $ErrorActionPreference = "Stop"
          $bucket = "totd-updates"
          $api = "https://api.cloudflare.com/client/v4/accounts/$($env:CLOUDFLARE_ACCOUNT_ID)/r2/buckets/$bucket"
          $headers = @{ Authorization = "Bearer $($env:CLOUDFLARE_API_TOKEN)" }

          # 1. ローカル artifacts/ の manifest から keep set を構築
          #    public endpoint から fetch すると伝播遅延で旧 manifest を読み、
          #    新 nupkg が keep に入らず削除される race condition があるため
          $localManifests = @(Get-ChildItem -Path "artifacts" -Filter "releases.*.json" -File)
          if ($localManifests.Count -eq 0) {
            Write-Error "::error::artifacts/releases.*.json not found. vpk pack may have failed."
            exit 1
          }
          $keep = @{}
          foreach ($m in $localManifests) {
            Write-Host "Reading local manifest: $($m.Name)"
            $json = Get-Content -Path $m.FullName -Raw | ConvertFrom-Json
            foreach ($a in @($json.Assets)) {
              if ($a.FileName) { $keep[$a.FileName] = $true }
            }
          }
          Write-Host "::group::manifest 内の保持対象 nupkg ($($keep.Count) files)"
          $keep.Keys | Sort-Object | ForEach-Object { Write-Host "  $_" }
          Write-Host "::endgroup::"

          # 2. R2 上の全 object を cursor ページネーション付きで取得
          $allKeys = @()
          $cursor = ""
          do {
            $uri = "$api/objects?per_page=1000"
            if ($cursor) { $uri += "&cursor=$cursor" }
            $resp = Invoke-RestMethod -Uri $uri -Headers $headers -Method Get -TimeoutSec 30
            foreach ($o in @($resp.result)) { $allKeys += $o.key }
            $truncated = $resp.result_info.is_truncated
            $cursor = $resp.result_info.cursor
          } while ($truncated -eq $true -and $cursor)

          Write-Host "::group::R2 内全オブジェクト ($($allKeys.Count) files)"
          $allKeys | ForEach-Object { Write-Host "  $_" }
          Write-Host "::endgroup::"

          # 3. 削除対象判定: 拡張子 .nupkg かつ keep 外
          $toDelete = @($allKeys | Where-Object { $_ -like "*.nupkg" -and -not $keep.ContainsKey($_) })
          if ($toDelete.Count -eq 0) {
            Write-Host "削除対象なし - R2 上の全 nupkg が manifest に含まれています"
            exit 0
          }
          Write-Host "::group::削除対象 ($($toDelete.Count) files)"
          $toDelete | ForEach-Object { Write-Host "  $_" }
          Write-Host "::endgroup::"

          # 4. 一個ずつ DELETE
          $deleted = 0
          $failed = 0
          foreach ($key in $toDelete) {
            $enc = [System.Uri]::EscapeDataString($key)
            try {
              $r = Invoke-RestMethod -Uri "$api/objects/$enc" -Headers $headers -Method Delete -TimeoutSec 30
              if ($r.success) {
                Write-Host "  Deleted: $key"
                $deleted++
              } else {
                Write-Host "  Failed: $key"
                $failed++
              }
            } catch {
              Write-Host "  Failed: $key ($($_.Exception.Message))"
              $failed++
            }
          }

          Write-Host ""
          Write-Host "R2 クリーンアップ完了: $deleted / $($toDelete.Count) 削除  (失敗: $failed)"
          # 失敗があってもリリース自体は成功扱い (削除失敗は次回リリースで再試行される)
          # ただし全件失敗の場合はワークフロー失敗にして気付けるようにする
          if ($failed -gt 0 -and $deleted -eq 0) {
            Write-Error "::error::all deletes failed. check API token permission / bucket name."
            exit 1
          }

      # ⚠️ 一時的 (/transfer-cf Step 11.5): 旧 GithubSource クライアント救済の踏み台 publish。
      # この 1 リリースを GitHub Releases にも出して旧クライアントの R2 移行起点にする。
      # 踏み台 publish 完了後にこのステップを削除し permissions も contents:read へ戻す。
      - name: 踏み台を GitHub Releases に publish (一時的・移行後に削除)
        shell: pwsh
        run: |
          $outputDir = "artifacts"
          if (-not (Test-Path $outputDir)) {
            Write-Error "Artifacts directory not found: $outputDir"
            exit 1
          }
          $repoUrl = "https://github.com/${{ github.repository }}"
          $releaseName = "ディスプレイ＠OFF $env:RELEASE_VERSION"
          Write-Host "踏み台を GitHub Releases に publish: $releaseName ($repoUrl)"
          vpk upload github `
            --repoUrl $repoUrl `
            --token "${{ secrets.GITHUB_TOKEN }}" `
            --outputDir $outputDir `
            --channel win `
            --publish `
            --releaseName $releaseName
          if ($LASTEXITCODE -ne 0) {
            Write-Error "vpk upload (踏み台) failed with exit code $LASTEXITCODE"
            exit 1
          }
          Write-Host "✅ 踏み台 publish 完了: $env:RELEASE_VERSION"
